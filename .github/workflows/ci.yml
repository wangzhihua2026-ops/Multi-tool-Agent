name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test-platform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,platform,observability,postgres]"
      - name: Unit and baseline tests
        run: python -m pytest -q
      - name: Start integration infrastructure
        run: docker compose -f docker-compose.test.yml up -d postgres redis
      - name: Migrate integration database
        run: docker compose -f docker-compose.test.yml run --rm migrate alembic upgrade head
      - name: PostgreSQL and Redis integration tests
        run: docker compose -f docker-compose.test.yml run --rm test-platform python -m pytest tests/integration -q
      - name: Build and start four-service platform
        run: docker compose up -d --build
      - name: Wait for API
        run: |
          for attempt in $(seq 1 60); do
            curl -fsS http://127.0.0.1:8000/api/health && exit 0
            sleep 2
          done
          exit 1
      - name: Reliability checks
        run: python scripts/fault_injection_check.py --base-url http://127.0.0.1:8000
      - name: Deterministic evaluation
        run: python scripts/evaluate_agent_platform.py --provider mock
      - name: Upload platform evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-platform-evidence
          path: |
            evaluation/results/
            docker-compose.yml
      - name: Capture Docker logs
        if: failure()
        run: docker compose logs --no-color > docker-compose.log
      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-failure-logs
          path: docker-compose.log
