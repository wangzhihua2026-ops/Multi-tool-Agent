name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test-and-package:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest -q

      - name: Build Docker image
        run: docker build -t multi-tool-agent:ci .

      - name: Smoke test Docker image
        run: |
          set -euo pipefail
          docker run --rm -d --name multi-tool-agent-ci -p 8000:8000 multi-tool-agent:ci
          trap 'docker logs multi-tool-agent-ci || true; docker stop multi-tool-agent-ci || true' EXIT

          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/api/health; then
              exit 0
            fi
            sleep 1
          done

          echo "Container health check did not pass in time."
          exit 1
