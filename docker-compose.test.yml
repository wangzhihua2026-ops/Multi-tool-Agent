services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agent
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d agent"]
      interval: 2s
      timeout: 3s
      retries: 20
    ports:
      - "55432:5432"

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 20
    ports:
      - "56379:6379"

  migrate:
    build:
      context: .
      args:
        INSTALL_EXTRAS: "dev,platform"
    working_dir: /app
    environment:
      PLATFORM_DATABASE_URL: postgresql+asyncpg://agent:agent@postgres:5432/agent
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy

  test-platform:
    build:
      context: .
      args:
        INSTALL_EXTRAS: "dev,platform"
    working_dir: /app
    environment:
      TEST_DATABASE_URL: postgresql+asyncpg://agent:agent@postgres:5432/agent
      TEST_REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
