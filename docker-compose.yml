services:
  agent:
    build:
      context: .
    ports:
      - "8000:8000"
    environment:
      APP_NAME: "Multi Tool Agent"
      ENVIRONMENT: "docker"
      LOG_LEVEL: "INFO"
      LLM_PROVIDER: "mock"
      EMBEDDING_PROVIDER: "hash"
      EMBEDDING_DIMENSIONS: "128"
      KNOWLEDGE_STORE_PROVIDER: "sqlite"
      KNOWLEDGE_STORE_PATH: "/app/data/knowledge_base.db"
      VECTOR_STORE_PROVIDER: "memory"
      RUN_STORAGE_PATH: "/app/data/multi_tool_agent.db"
      EXTRACTION_EXPORT_PATH: "/app/data/exports"
      API_ALLOW_REMOTE_WITHOUT_TOKEN: "true"
    volumes:
      - agent-data:/app/data
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3).read()"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  agent-data:
